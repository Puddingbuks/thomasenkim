<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Save the Date · Thomas & Kim · 30 juli 2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F1E5;
    --light: #FCF8F0;
    --brown: #4A4234;
    --sage: #7E866B;
    --gold: #b08a52;
    --muted: #8a7d63;
  }

  html, body {
    min-height: 100%;
    background: var(--cream);
    color: var(--brown);
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100svh;
    padding: 2rem 1.5rem;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--light);
    border: 1px solid rgba(176,138,82,0.2);
    border-radius: 4px;
    padding: 3rem 2.5rem 2.5rem;
    text-align: center;
    box-shadow: 0 2px 24px rgba(74,66,52,0.07);
  }

  .save-the-date-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 0.35rem 1rem;
    margin-bottom: 1.8rem;
    border-radius: 2px;
  }

  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .names {
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(3rem, 12vw, 4rem);
    color: var(--brown);
    line-height: 1.1;
  }

  .divider {
    margin: 1.2rem auto;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    justify-content: center;
    color: var(--gold);
    opacity: 0.7;
  }
  .divider::before, .divider::after {
    content: '';
    display: block;
    width: 3rem;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }

  .date-block {
    line-height: 1.5;
  }
  .date-block .day {
    font-size: 1.5rem;
    font-weight: 300;
  }
  .date-block .detail {
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .sprig-row {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin: 1.4rem 0 0;
    opacity: 0.45;
  }
  .sprig-row svg { width: 32px; height: 54px; }

  /* RSVP */
  .rsvp-section {
    margin-top: 2rem;
    border-top: 1px solid rgba(176,138,82,0.2);
    padding-top: 2rem;
  }

  .rsvp-label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }

  .rsvp-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .btn {
    width: 100%;
    padding: 0.85rem 1.5rem;
    border: 1.5px solid;
    background: transparent;
    color: var(--brown);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
  }
  .btn.yes  { border-color: var(--sage); }
  .btn.no   { border-color: var(--muted); }
  .btn.maybe { border-color: var(--muted); }

  .btn:hover        { opacity: 0.85; }
  .btn.selected-yes   { background: var(--sage);  color: #fff; border-color: var(--sage); }
  .btn.selected-no    { background: var(--brown); color: var(--cream); border-color: var(--brown); }
  .btn.selected-maybe { background: var(--muted); color: #fff; border-color: var(--muted); }
  .btn:disabled { opacity: 0.5; cursor: default; }

  /* Form */
  .form-area {
    margin-top: 1.5rem;
    display: none;
    flex-direction: column;
    gap: 0.85rem;
    text-align: left;
  }
  .form-area.visible { display: flex; }

  .form-area label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 0.3rem;
  }

  .form-area input,
  .form-area textarea {
    width: 100%;
    padding: 0.65rem 0.85rem;
    border: 1px solid rgba(74,66,52,0.2);
    background: var(--cream);
    color: var(--brown);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1rem;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-area input:focus,
  .form-area textarea:focus { border-color: var(--sage); }
  .form-area textarea { resize: vertical; min-height: 76px; }

  .plus-one-row {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-size: 0.95rem;
    color: var(--brown);
    cursor: pointer;
    user-select: none;
  }
  .plus-one-row input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: var(--sage);
    cursor: pointer;
    flex-shrink: 0;
  }

  .plus-one-field { display: none; margin-top: 0.5rem; }
  .plus-one-field.visible { display: block; }

  .field-note {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.5;
    margin-top: 0.2rem;
  }

  .submit-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--sage);
    color: #fff;
    border: none;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.18s;
    margin-top: 0.25rem;
  }
  .submit-btn:hover { background: var(--brown); }
  .submit-btn.dark  { background: var(--brown); }
  .submit-btn.dark:hover { background: #2e2820; }

  /* Confirmation */
  .confirmation {
    display: none;
    margin-top: 1.5rem;
    padding: 1.2rem 1rem;
    background: rgba(126,134,107,0.1);
    border-radius: 3px;
    font-size: 1rem;
    color: var(--brown);
    line-height: 1.6;
  }
  .confirmation.visible { display: block; }
  .confirmation strong {
    display: block;
    font-size: 1.1rem;
    margin-bottom: 0.4rem;
  }

  @media (max-width: 400px) {
    .card { padding: 2rem 1.25rem; }
    .names { font-size: 2.8rem; }
  }
</style>
</head>
<body>

<div class="card">

  <div class="save-the-date-badge">Save the Date</div>

  <div class="eyebrow">Wij gaan trouwen</div>

  <div class="names">Thomas &amp; Kim</div>

  <div class="divider">✦</div>

  <div class="date-block">
    <div class="day">Vrijdag 30 juli 2027</div>
    <div class="detail">On The Rock &middot; Aalsmeer &middot; 14:30 &ndash; 01:00</div>
  </div>

  <div class="sprig-row">
    <svg viewBox="0 0 40 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="20" y1="4" x2="20" y2="66" stroke="#7E866B" stroke-width="1"/>
      <ellipse cx="12" cy="19" rx="7" ry="4" stroke="#7E866B" stroke-width="1" transform="rotate(-18 12 19)"/>
      <ellipse cx="28" cy="31" rx="7" ry="4" stroke="#7E866B" stroke-width="1" transform="rotate(18 28 31)"/>
      <ellipse cx="12" cy="43" rx="7" ry="4" stroke="#7E866B" stroke-width="1" transform="rotate(-18 12 43)"/>
      <ellipse cx="28" cy="55" rx="7" ry="4" stroke="#7E866B" stroke-width="1" transform="rotate(18 28 55)"/>
    </svg>
    <svg viewBox="0 0 40 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="20" y1="4" x2="20" y2="66" stroke="#7E866B" stroke-width="1"/>
      <ellipse cx="28" cy="19" rx="7" ry="4" stroke="#7E866B" stroke-width="1" transform="rotate(18 28 19)"/>
      <ellipse cx="12" cy="31" rx="7" ry="4" stroke="#7E866B" stroke-width="1" transform="rotate(-18 12 31)"/>
      <ellipse cx="28" cy="43" rx="7" ry="4" stroke="#7E866B" stroke-width="1" transform="rotate(18 28 43)"/>
      <ellipse cx="12" cy="55" rx="7" ry="4" stroke="#7E866B" stroke-width="1" transform="rotate(-18 12 55)"/>
    </svg>
  </div>

  <div class="rsvp-section">
    <div class="rsvp-label">Kun jij erbij zijn?</div>

    <div class="rsvp-buttons">
      <button class="btn yes"   onclick="selectRsvp('yes')">Jazeker! 🥂</button>
      <button class="btn maybe" onclick="selectRsvp('maybe')">Nog niet zeker</button>
      <button class="btn no"    onclick="selectRsvp('no')">Nee, helaas niet</button>
    </div>

    <!-- Jazeker -->
    <div class="form-area" id="formYes">
      <div>
        <label>Jouw naam</label>
        <input type="text" id="nameYes" placeholder="Voor- en achternaam" autocomplete="name">
      </div>
      <div>
        <label>E-mailadres</label>
        <input type="email" id="emailYes" placeholder="jouw@email.nl" autocomplete="email">
      </div>
      <div>
        <label class="plus-one-row">
          <input type="checkbox" id="plusOneCheck" onchange="togglePlusOne()">
          Ik neem een partner mee
        </label>
        <div class="plus-one-field" id="plusOneField">
          <input type="text" id="plusOneName" placeholder="Naam partner">
        </div>
        <div class="field-note">Kinderen zijn helaas niet aanwezig bij dit feest &mdash; alleen op persoonlijke uitnodiging.</div>
      </div>
      <div>
        <label>Bericht (optioneel)</label>
        <textarea id="msgYes" placeholder="Iets leuks kwijt?"></textarea>
      </div>
      <button class="submit-btn" onclick="submitRsvp('yes')">Aanmelden ✓</button>
    </div>

    <!-- Nog niet zeker -->
    <div class="form-area" id="formMaybe">
      <div>
        <label>Jouw naam</label>
        <input type="text" id="nameMaybe" placeholder="Voor- en achternaam" autocomplete="name">
      </div>
      <div>
        <label>E-mailadres (zodat we contact kunnen opnemen)</label>
        <input type="email" id="emailMaybe" placeholder="jouw@email.nl" autocomplete="email">
      </div>
      <div>
        <label>Wanneer weet je het wel? (optioneel)</label>
        <input type="text" id="msgMaybe" placeholder="bijv. na de zomer">
      </div>
      <button class="submit-btn" onclick="submitRsvp('maybe')">Versturen</button>
    </div>

    <!-- Nee -->
    <div class="form-area" id="formNo">
      <div>
        <label>Jouw naam</label>
        <input type="text" id="nameNo" placeholder="Voor- en achternaam" autocomplete="name">
      </div>
      <div>
        <label>Bericht (optioneel)</label>
        <textarea id="msgNo" placeholder="We snappen het, maar vinden het jammer!"></textarea>
      </div>
      <button class="submit-btn dark" onclick="submitRsvp('no')">Versturen</button>
    </div>

    <div class="confirmation" id="confirmation"></div>
  </div>

</div>

<script>
  function selectRsvp(choice) {
    // Update button states
    document.querySelectorAll('.btn').forEach(b => {
      b.classList.remove('selected-yes', 'selected-no', 'selected-maybe');
    });
    document.querySelector('.btn.' + choice).classList.add('selected-' + choice);

    // Show/hide forms
    ['yes','maybe','no'].forEach(c => {
      document.getElementById('form' + cap(c)).classList.toggle('visible', c === choice);
    });
    document.getElementById('confirmation').classList.remove('visible');

    // Scroll into view
    setTimeout(() => {
      document.getElementById('form' + cap(choice))
        ?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 60);
  }

  function togglePlusOne() {
    const on = document.getElementById('plusOneCheck').checked;
    document.getElementById('plusOneField').classList.toggle('visible', on);
  }

  function submitRsvp(type) {
    const name = val('name' + cap(type));
    const email = val('email' + cap(type));
    const plusOne = type === 'yes' && document.getElementById('plusOneCheck').checked;
    const plusOneName = plusOne ? val('plusOneName') : null;
    const message = val('msg' + cap(type));

    if (!name) {
      alert('Vul je naam in.');
      document.getElementById('name' + cap(type)).focus();
      return;
    }

    const data = { type, name, email, plusOne, plusOneName, message, timestamp: new Date().toISOString() };

    // Webhook (fire & forget)
    fetch('https://n8n.rankengine.nl/webhook/thomasenkim-rsvp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).catch(() => {});

    localStorage.setItem('tkRsvp', JSON.stringify(data));

    // Hide all forms and buttons
    ['yes','maybe','no'].forEach(c =>
      document.getElementById('form' + cap(c)).classList.remove('visible'));
    document.querySelectorAll('.btn').forEach(b => b.disabled = true);

    const conf = document.getElementById('confirmation');
    const msgs = {
      yes: () => {
        let t = `<strong>Fantastisch${name ? ', ' + name.split(' ')[0] : ''}! 🥂</strong>We hebben je aanmelding ontvangen.`;
        if (plusOne && plusOneName) t += ` ${plusOneName} is ook van harte welkom!`;
        else if (plusOne) t += ' Je partner is ook van harte welkom!';
        t += ' We sturen je binnenkort meer info.';
        return t;
      },
      maybe: () => `<strong>Geen probleem${name ? ', ' + name.split(' ')[0] : ''}!</strong>We houden een plekje vrij en nemen later contact op.`,
      no: () => `<strong>Jammer dat je er niet bij kunt zijn${name ? ', ' + name.split(' ')[0] : ''}.</strong>Bedankt voor je reactie — we denken aan je op die dag! 💛`
    };

    conf.innerHTML = msgs[type]();
    conf.classList.add('visible');
    conf.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
  function val(id) { return document.getElementById(id)?.value.trim() || ''; }

  // Restore submitted state
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('tkRsvp');
    if (!saved) return;
    try {
      const d = JSON.parse(saved);
      const label = d.type === 'yes' ? 'Jazeker!' : d.type === 'maybe' ? 'Nog niet zeker' : 'Nee helaas';
      document.getElementById('confirmation').innerHTML =
        `<strong>Je hebt al gereageerd</strong>Jouw keuze: ${label}. Bedankt!`;
      document.getElementById('confirmation').classList.add('visible');
      document.querySelectorAll('.btn').forEach(b => b.disabled = true);
    } catch(e) {}
  });
</script>

</body>
</html>
